<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="512" rx="114" fill="url(#sheen)"/>

  <!-- source : petit égaliseur (l'audio d'entrée) -->
  <g stroke="#ffffff" stroke-width="18" stroke-linecap="round">
    <line x1="128" y1="232" x2="128" y2="280"/>
    <line x1="158" y1="212" x2="158" y2="300"/>
    <line x1="188" y1="238" x2="188" y2="274"/>
  </g>

  <!-- fan-out : 3 courbes vers 3 sorties synchronisées -->
  <g stroke="#ffffff" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.95">
    <path d="M206 256 C 280 256, 300 150, 360 150"/>
    <path d="M206 256 C 300 256, 320 256, 360 256"/>
    <path d="M206 256 C 280 256, 300 362, 360 362"/>
  </g>

  <!-- sorties alignées (la synchro) -->
  <line x1="384" y1="132" x2="384" y2="380" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <g fill="#ffffff">
    <circle cx="384" cy="150" r="26"/>
    <circle cx="384" cy="256" r="26"/>
    <circle cx="384" cy="362" r="26"/>
  </g>
</svg>
